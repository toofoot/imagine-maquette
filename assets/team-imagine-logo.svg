<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 130" fill="none">
  <!-- GROUPE BPCE block -->
  <g>
    <!-- Violet brushstroke circle -->
    <ellipse cx="55" cy="65" rx="38" ry="38" fill="#581d74"/>
    <ellipse cx="55" cy="65" rx="28" ry="28" fill="#fff"/>
    <ellipse cx="55" cy="65" rx="17" ry="17" fill="#7a3aa3"/>
    <ellipse cx="58" cy="62" rx="5" ry="6" fill="#fff" opacity=".4"/>

    <text x="115" y="55" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="#2a2a2a" letter-spacing="1">GROUPE</text>
    <text x="115" y="90" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="800" fill="#0a0a0a" letter-spacing="-0.5">BPCE</text>
  </g>

  <!-- Vertical divider -->
  <line x1="248" y1="30" x2="248" y2="100" stroke="#c8c8c8" stroke-width="1.5"/>

  <!-- team IMAGINE block with rainbow arrows -->
  <g transform="translate(270, 25)">
    <!-- "team" -->
    <text x="48" y="22" font-family="Georgia,serif" font-size="20" font-weight="500" fill="#3d3d3d" font-style="italic">team</text>

    <!-- Stacked rainbow arcs (mimics the multi-color arc of Team Imagine logo) -->
    <g transform="translate(8, 26)" stroke-linecap="round" fill="none">
      <path d="M0 38 A 38 38 0 0 1 76 38" stroke="#5a4fcf" stroke-width="6"/>
      <path d="M6 44 A 32 32 0 0 1 70 44" stroke="#a25fce" stroke-width="6"/>
      <path d="M12 50 A 26 26 0 0 1 64 50" stroke="#e4549a" stroke-width="6"/>
      <path d="M18 56 A 20 20 0 0 1 58 56" stroke="#f06a3f" stroke-width="6"/>
      <path d="M24 62 A 14 14 0 0 1 52 62" stroke="#f0a850" stroke-width="6"/>
      <path d="M30 68 A 8 8 0 0 1 46 68" stroke="#2da8a3" stroke-width="6"/>
    </g>

    <!-- IMAGINE text -->
    <text x="93" y="72" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#1a1a1a" letter-spacing="0.5">imagine</text>
  </g>
</svg>
