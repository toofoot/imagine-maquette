<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 130" fill="none">
  <!-- BPCE GROUPE block -->
  <g>
    <!-- Violet circle with white inner -->
    <circle cx="55" cy="65" r="42" fill="#581d74"/>
    <circle cx="55" cy="65" r="32" fill="#fff"/>
    <circle cx="55" cy="65" r="22" fill="#581d74"/>
    <text x="125" y="55" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" fill="#3d3d3d" letter-spacing="0.5">GROUPE</text>
    <text x="125" y="85" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">BPCE</text>
  </g>

  <!-- Vertical divider -->
  <line x1="245" y1="35" x2="245" y2="95" stroke="#b5b5b5" stroke-width="1.5"/>

  <!-- team IMAGINE block with rainbow arrows -->
  <g transform="translate(265, 30)">
    <!-- team text -->
    <text x="35" y="20" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="500" fill="#3d3d3d" font-style="italic">team</text>

    <!-- Multi-color arc rings (simplified rainbow) -->
    <g transform="translate(15, 30)">
      <path d="M0 30 A 30 30 0 0 1 60 30" stroke="#f0a850" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M5 36 A 28 28 0 0 1 55 36" stroke="#e85d4c" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M10 42 A 24 24 0 0 1 50 42" stroke="#d6336c" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M15 48 A 18 18 0 0 1 45 48" stroke="#9c2378" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M20 54 A 12 12 0 0 1 40 54" stroke="#5a4fcf" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M25 60 A 6 6 0 0 1 35 60" stroke="#2da8a3" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- IMAGINE text -->
    <text x="80" y="70" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="800" fill="#1a1a1a" letter-spacing="1">IMAGINE</text>
  </g>
</svg>
