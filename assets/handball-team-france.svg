  <!-- Caption -->
  <text x="400" y="490" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" opacity="0.7">ÉQUIPE DE FRANCE DE HANDBALL · CHAMPIONS</text>
</svg>
