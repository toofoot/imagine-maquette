      <circle cx="170" cy="215" r="2"/><circle cx="210" cy="200" r="2"/><circle cx="250" cy="210" r="2"/>
      <circle cx="290" cy="205" r="2"/><circle cx="330" cy="215" r="2"/><circle cx="370" cy="200" r="2"/>
