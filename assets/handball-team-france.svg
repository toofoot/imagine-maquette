<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <radialGradient id="spot" cx="50%" cy="20%" r="80%">
        <stop offset="0%" stop-color="#3a1a55"/>
        <stop offset="100%" stop-color="#0a0518"/>
      </radialGradient>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="crowdGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6b239a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1c0926"/>
    </radialGradient>
  </defs>

  <!-- background arena -->
  <rect width="800" height="500" fill="#1a0a2e"/>
  <rect width="800" height="350" fill="url(#crowdGrad)"/>

  <!-- Crowd dots (audience) -->
  <g opacity="0.5">
