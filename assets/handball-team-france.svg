<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="arena" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#6b239a" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#2a0f3d"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </radialGradient>
    <linearGradient id="court" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d3a8a"/>
      <stop offset="100%" stop-color="#0f1f4a"/>
    </linearGradient>
  </defs>

  <!-- Arena dark background -->
  <rect width="1600" height="900" fill="#15082a"/>
  <rect width="1600" height="600" fill="url(#arena)"/>

  <!-- Crowd dots -->
  <g opacity="0.5">
    <g fill="#c699e2">
      <circle cx="60" cy="220" r="3"/><circle cx="160" cy="240" r="3"/><circle cx="260" cy="225" r="3"/>
      <circle cx="360" cy="240" r="3"/><circle cx="460" cy="225" r="3"/><circle cx="560" cy="235" r="3"/>
      <circle cx="660" cy="225" r="3"/><circle cx="760" cy="240" r="3"/><circle cx="860" cy="225" r="3"/>
      <circle cx="960" cy="240" r="3"/><circle cx="1060" cy="225" r="3"/><circle cx="1160" cy="235" r="3"/>
      <circle cx="1260" cy="225" r="3"/><circle cx="1360" cy="240" r="3"/><circle cx="1460" cy="225" r="3"/>
    </g>
    <g fill="#ff7a7a">
      <circle cx="100" cy="280" r="3"/><circle cx="200" cy="300" r="3"/><circle cx="300" cy="285" r="3"/>
      <circle cx="400" cy="295" r="3"/><circle cx="500" cy="280" r="3"/><circle cx="600" cy="290" r="3"/>
      <circle cx="700" cy="285" r="3"/><circle cx="800" cy="300" r="3"/><circle cx="900" cy="285" r="3"/>
      <circle cx="1000" cy="295" r="3"/><circle cx="1100" cy="280" r="3"/><circle cx="1200" cy="290" r="3"/>
      <circle cx="1300" cy="285" r="3"/><circle cx="1400" cy="300" r="3"/><circle cx="1500" cy="285" r="3"/>
    </g>
    <g fill="#fff">
      <circle cx="80" cy="340" r="2"/><circle cx="180" cy="355" r="2"/><circle cx="280" cy="345" r="2"/>
      <circle cx="380" cy="360" r="2"/><circle cx="480" cy="345" r="2"/><circle cx="580" cy="355" r="2"/>
      <circle cx="680" cy="350" r="2"/><circle cx="780" cy="360" r="2"/><circle cx="880" cy="345" r="2"/>
      <circle cx="980" cy="355" r="2"/><circle cx="1080" cy="350" r="2"/><circle cx="1180" cy="360" r="2"/>
      <circle cx="1280" cy="345" r="2"/><circle cx="1380" cy="355" r="2"/><circle cx="1480" cy="350" r="2"/>
    </g>
  </g>

  <!-- LED FRANCE banner -->
  <rect x="0" y="120" width="1600" height="50" fill="#1a3a8a"/>
  <g font-family="Arial,Helvetica,sans-serif" font-weight="800" fill="#fff" font-size="28">
    <text x="160" y="155">FRANCE</text>
    <text x="560" y="155">FRANCE</text>
    <text x="960" y="155">FRANCE</text>
    <text x="1360" y="155">FRANCE</text>
  </g>
  <g>
    <rect x="100" y="130" width="10" height="32" fill="#0055a4"/><rect x="110" y="130" width="10" height="32" fill="#fff"/><rect x="120" y="130" width="10" height="32" fill="#ef4135"/>
    <rect x="500" y="130" width="10" height="32" fill="#0055a4"/><rect x="510" y="130" width="10" height="32" fill="#fff"/><rect x="520" y="130" width="10" height="32" fill="#ef4135"/>
    <rect x="900" y="130" width="10" height="32" fill="#0055a4"/><rect x="910" y="130" width="10" height="32" fill="#fff"/><rect x="920" y="130" width="10" height="32" fill="#ef4135"/>
    <rect x="1300" y="130" width="10" height="32" fill="#0055a4"/><rect x="1310" y="130" width="10" height="32" fill="#fff"/><rect x="1320" y="130" width="10" height="32" fill="#ef4135"/>
  </g>

  <!-- Court floor -->
  <rect x="0" y="600" width="1600" height="300" fill="url(#court)"/>

  <!-- Caisse d'Épargne center logo on court -->
  <ellipse cx="800" cy="830" rx="240" ry="40" fill="#e2001a" opacity="0.95"/>
  <text x="800" y="840" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="28" fill="#fff" text-anchor="middle">UTILE AU SPORT</text>

  <!-- Players row (16 silhouettes) -->
  <g transform="translate(0, 430)" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="14" fill="#003a78" text-anchor="middle">
    <!-- Each player: skin head, white jersey with red/blue stripes, number -->
    <g transform="translate(110,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">23</text></g>
    <g transform="translate(200,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#d4a273"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">39</text></g>
    <g transform="translate(290,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#ffd700"/><text y="95" fill="#000">92</text></g>
    <g transform="translate(380,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#9a6a4a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">25</text></g>
    <g transform="translate(470,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">29</text></g>
    <g transform="translate(560,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#d4a273"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#ffd700"/><text y="95" fill="#000">12</text></g>
    <g transform="translate(650,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">8</text></g>
    <g transform="translate(740,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">17</text></g>
    <!-- Captain with trophy in center -->
    <g transform="translate(830,0)">
      <ellipse cx="0" cy="-20" rx="18" ry="22" fill="#d4a273"/>
      <path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/>
      <path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/>
      <path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/>
      <text y="95">10</text>
      <!-- Trophy held -->
      <rect x="-18" y="-58" width="36" height="38" rx="4" fill="#f0c050" stroke="#a06800" stroke-width="2"/>
      <text x="0" y="-32" font-size="8" fill="#5a3500">TROPHÉE</text>
      <path d="M-26 -52 L-18 -52 L-18 -32 Q-26 -32 -26 -42 Z" fill="#a06800"/>
      <path d="M26 -52 L18 -52 L18 -32 Q26 -32 26 -42 Z" fill="#a06800"/>
    </g>
    <g transform="translate(920,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">11</text></g>
    <g transform="translate(1010,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#9a6a4a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">31</text></g>
    <g transform="translate(1100,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#d4a273"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">4</text></g>
    <g transform="translate(1190,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#9a6a4a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">7</text></g>
    <g transform="translate(1280,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">21</text></g>
    <g transform="translate(1370,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#9a6a4a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">11</text></g>
    <g transform="translate(1460,0)"><ellipse cx="0" cy="-20" rx="18" ry="22" fill="#e8c19a"/><path d="M-32 14 L-32 160 L32 160 L32 14 Z" fill="#fff"/><path d="M-26 22 L-12 70 L-6 60 Z" fill="#0055a4"/><path d="M26 22 L12 70 L6 60 Z" fill="#ef4135"/><text y="95">10</text></g>
  </g>

  <!-- Sparkle effects -->
  <g fill="#fff" opacity="0.9">
    <circle cx="400" cy="430" r="4"/>
    <circle cx="700" cy="400" r="3"/>
    <circle cx="900" cy="410" r="3"/>
    <circle cx="1200" cy="425" r="4"/>
  </g>

  <!-- Caption fallback -->
  <text x="800" y="880" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle" opacity="0.6">ÉQUIPE DE FRANCE DE HANDBALL · TOURNOI DE FRANCE</text>
</svg>
