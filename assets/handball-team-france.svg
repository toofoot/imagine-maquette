      <circle cx="180" cy="135" r="3"/><circle cx="220" cy="120" r="3"/><circle cx="260" cy="130" r="3"/>
      <circle cx="300" cy="125" r="3"/><circle cx="340" cy="140" r="3"/><circle cx="380" cy="125" r="3"/>
      <circle cx="420" cy="135" r="3"/><circle cx="460" cy="120" r="3"/><circle cx="500" cy="130" r="3"/>
      <circle cx="540" cy="125" r="3"/><circle cx="580" cy="140" r="3"/><circle cx="620" cy="125" r="3"/>
      <circle cx="660" cy="135" r="3"/><circle cx="700" cy="120" r="3"/><circle cx="740" cy="130" r="3"/>
    </g>
    <g fill="#e85d4c">
