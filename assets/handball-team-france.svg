      <circle cx="200" cy="175" r="3"/><circle cx="240" cy="160" r="3"/><circle cx="280" cy="170" r="3"/>
      <circle cx="320" cy="165" r="3"/><circle cx="360" cy="180" r="3"/><circle cx="400" cy="165" r="3"/>
      <circle cx="440" cy="175" r="3"/><circle cx="480" cy="160" r="3"/><circle cx="520" cy="170" r="3"/>
