name: Deploy Pages

on:
  push:
    branches:
      - master
      - V2
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir site

          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            cp -r . site/
          fi

          if [ "${GITHUB_REF_NAME}" = "V2" ]; then
            mkdir -p site/v2
            cp -r . site/v2/
          fi

          rm -rf site/.git site/.github

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4